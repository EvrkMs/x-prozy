
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Syne:wght@400;600;700;800&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  .root {
    min-height: 100vh;
    background: #0b0a12;
    display: flex;
    font-family: 'Syne', sans-serif;
    position: relative;
    overflow: hidden;
  }

  .bg-grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(140,100,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(140,100,255,0.04) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
  }

  .node-dot {
    position: absolute;
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: #a855f7;
    opacity: 0.25;
  }

  .node-dot.active {
    opacity: 0.7;
    animation: pulse-dot 2.5s ease-in-out infinite;
  }

  @keyframes pulse-dot {
    0%, 100% { opacity: 0.7; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.6); }
  }

  .left-panel {
    width: 52%;
    padding: 3rem;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    position: relative;
    border-right: 0.5px solid rgba(140,100,255,0.1);
  }

  .brand { display: flex; align-items: center; gap: 10px; }

  .brand-icon {
    width: 36px;
    height: 36px;
    border: 1.5px solid rgba(168,85,247,0.6);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  .brand-icon::before {
    content: '';
    width: 14px;
    height: 14px;
    border-radius: 50%;
    border: 1.5px solid #a855f7;
  }

  .brand-icon::after {
    content: '';
    position: absolute;
    width: 22px;
    height: 1px;
    background: rgba(168,85,247,0.4);
    top: 50%;
  }

  .brand-name {
    font-size: 15px;
    font-weight: 700;
    color: #f0ecff;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .brand-tag {
    font-size: 10px;
    font-family: 'JetBrains Mono', monospace;
    color: #a855f7;
    letter-spacing: 0.12em;
    opacity: 0.7;
  }

  .network-map { flex: 1; display: flex; align-items: center; justify-content: center; padding: 2rem 0; }
  .map-svg { width: 100%; max-width: 400px; height: auto; }

  .stats-row { display: flex; gap: 2rem; }
  .stat { display: flex; flex-direction: column; gap: 4px; }

  .stat-val {
    font-size: 22px;
    font-weight: 800;
    color: #a855f7;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: -0.02em;
  }

  .stat-label {
    font-size: 11px;
    color: rgba(240,236,255,0.4);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .right-panel {
    width: 48%;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 3rem;
  }

  .login-card {
    width: 100%;
    max-width: 380px;
    background: rgba(14,10,22,0.97);
    border: 0.5px solid rgba(140,100,255,0.2);
    border-radius: 16px;
    padding: 2.5rem;
    position: relative;
  }

  .login-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 2rem;
    right: 2rem;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(168,85,247,0.5), transparent);
  }

  .card-header { margin-bottom: 2rem; }

  .card-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: #a855f7;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    opacity: 0.8;
    margin-bottom: 8px;
  }

  .card-title {
    font-size: 26px;
    font-weight: 800;
    color: #f0ecff;
    line-height: 1.1;
    letter-spacing: -0.02em;
  }

  .card-sub {
    font-size: 13px;
    color: rgba(240,236,255,0.35);
    margin-top: 6px;
    line-height: 1.5;
  }

  .field-group { margin-bottom: 1.25rem; }

  .field-label {
    font-size: 11px;
    font-family: 'JetBrains Mono', monospace;
    color: rgba(240,236,255,0.4);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 8px;
    display: block;
  }

  .field-wrap { position: relative; }

  .field-input {
    width: 100%;
    background: rgba(0,0,0,0.4);
    border: 0.5px solid rgba(140,100,255,0.15);
    border-radius: 8px;
    padding: 12px 40px 12px 14px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: #d4c8ff;
    outline: none;
    transition: border-color 0.2s;
    letter-spacing: 0.04em;
  }

  .field-input::placeholder { color: rgba(212,200,255,0.2); }

  .field-input:focus {
    border-color: rgba(168,85,247,0.5);
    background: rgba(140,100,255,0.04);
  }

  .field-icon {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    opacity: 0.3;
  }

  .row-opts {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1.75rem;
    margin-top: -0.25rem;
  }

  .check-label {
    display: flex;
    align-items: center;
    gap: 7px;
    font-size: 12px;
    color: rgba(240,236,255,0.4);
    cursor: pointer;
  }

  .check-box {
    width: 14px;
    height: 14px;
    border: 0.5px solid rgba(168,85,247,0.35);
    border-radius: 3px;
    background: rgba(168,85,247,0.07);
    position: relative;
    flex-shrink: 0;
  }

  .check-box::after {
    content: '';
    position: absolute;
    top: 3px;
    left: 2px;
    width: 8px;
    height: 5px;
    border-left: 1.5px solid #a855f7;
    border-bottom: 1.5px solid #a855f7;
    transform: rotate(-45deg);
  }

  .link-forgot {
    font-size: 12px;
    color: rgba(168,85,247,0.65);
    text-decoration: none;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.04em;
  }

  .btn-login {
    width: 100%;
    padding: 13px;
    background: #a855f7;
    border: none;
    border-radius: 8px;
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 700;
    color: #0b0a12;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: opacity 0.2s;
    margin-bottom: 1rem;
  }

  .btn-login:hover { opacity: 0.88; }

  .btn-login::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent 40%, rgba(255,255,255,0.15) 60%, transparent 80%);
    transform: translateX(-100%);
    animation: shimmer 3s ease-in-out infinite;
  }

  @keyframes shimmer {
    0% { transform: translateX(-100%); }
    60%, 100% { transform: translateX(200%); }
  }

  .btn-sso {
    width: 100%;
    padding: 12px;
    background: transparent;
    border: 0.5px solid rgba(140,100,255,0.22);
    border-radius: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: rgba(240,236,255,0.45);
    letter-spacing: 0.08em;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
    margin-bottom: 1.5rem;
  }

  .btn-sso:hover {
    border-color: rgba(168,85,247,0.45);
    color: rgba(240,236,255,0.75);
  }

  .status-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 12px;
    background: rgba(140,100,255,0.05);
    border: 0.5px solid rgba(140,100,255,0.12);
    border-radius: 6px;
  }

  .status-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #a855f7;
    flex-shrink: 0;
    animation: blink 2s ease-in-out infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .status-text {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: rgba(168,85,247,0.65);
    letter-spacing: 0.06em;
  }

  .status-val {
    margin-left: auto;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: rgba(168,85,247,0.4);
  }
</style>
