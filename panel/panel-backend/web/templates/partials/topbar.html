{{ define "topbar" }}
<header class="dash-topbar">
  <div>
    <div class="dash-topbar__title" id="page-title">Обзор системы</div>
    <div class="dash-topbar__crumb" id="page-crumb">дешборд / обзор системы</div>
  </div>
  <button class="theme-toggle" id="theme-toggle" title="Сменить тему">
    <svg class="theme-toggle__sun" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
      <circle cx="8" cy="8" r="3"/>
      <path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.1 3.1l1.4 1.4M11.5 11.5l1.4 1.4M11.5 3.1l-1.4 1.4M4.5 11.5l-1.4 1.4"/>
    </svg>
    <svg class="theme-toggle__moon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M13.5 9.5A5.5 5.5 0 016.5 2.5 5.5 5.5 0 1013.5 9.5z"/>
    </svg>
  </button>
</header>
{{ end }}
