{{ define "sidebar" }}
<aside class="dash-sidebar">
  <div class="dash-sidebar__head">
    <div class="dash-sidebar__brand">
      <div class="dash-sidebar__icon"></div>
      <div>
        <div class="dash-sidebar__name">Prozy</div>
        <div class="dash-sidebar__tag">Control Panel</div>
      </div>
    </div>
  </div>

  <nav class="dash-nav">
    <!-- Дешборд -->
    <div class="dash-nav__group is-open" data-nav-group>
      <button class="dash-nav__toggle is-open" data-nav-toggle>
        <span class="dash-nav__toggle-icon">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="1.5" y="1.5" width="5" height="5" rx="1"/>
            <rect x="9.5" y="1.5" width="5" height="5" rx="1"/>
            <rect x="1.5" y="9.5" width="5" height="5" rx="1"/>
            <rect x="9.5" y="9.5" width="5" height="5" rx="1"/>
          </svg>
        </span>
        Дешборд
        <svg class="dash-nav__chevron" width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 1l4 4-4 4"/></svg>
      </button>
      <div class="dash-nav__sub">
        <button class="dash-nav__item is-active" data-page="overview">Обзор системы</button>
      </div>
    </div>

    <!-- Ноды -->
    <div class="dash-nav__group" data-nav-group>
      <button class="dash-nav__toggle" data-nav-toggle>
        <span class="dash-nav__toggle-icon">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="8" cy="8" r="5.5"/>
            <circle cx="8" cy="8" r="2"/>
          </svg>
        </span>
        Ноды
        <span class="dash-nav__badge" id="nav-nodes-count" style="display:none">0</span>
        <svg class="dash-nav__chevron" width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 1l4 4-4 4"/></svg>
      </button>
      <div class="dash-nav__sub">
        <button class="dash-nav__item" data-page="nodes">Список нод</button>
      </div>
    </div>

    <!-- Настройки панели -->
    <div class="dash-nav__group" data-nav-group>
      <button class="dash-nav__toggle" data-nav-toggle>
        <span class="dash-nav__toggle-icon">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="8" cy="8" r="2.5"/>
            <path d="M8 1v2M8 13v2M1 8h2M13 8h2M3.1 3.1l1.4 1.4M11.5 11.5l1.4 1.4M11.5 3.1l-1.4 1.4M4.5 11.5l-1.4 1.4"/>
          </svg>
        </span>
        Настройки
        <svg class="dash-nav__chevron" width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 1l4 4-4 4"/></svg>
      </button>
      <div class="dash-nav__sub">
        <button class="dash-nav__item" data-page="account">Учётная запись</button>
        <button class="dash-nav__item" data-page="panel">Конфигурация</button>
        <button class="dash-nav__item" data-page="integrations">
          Интеграции
          <span class="dash-nav__badge dash-nav__badge--soon">soon</span>
        </button>
      </div>
    </div>
  </nav>

  <!-- User / Logout -->
  <div class="dash-sidebar__foot">
    <div class="dash-user">
      <div class="dash-user__avatar">{{ slice .Username 0 1 }}</div>
      <div class="dash-user__info">
        <div class="dash-user__name">{{ .Username }}</div>
        <div class="dash-user__role">operator</div>
      </div>
      <form method="post" action="{{ .BasePath }}/logout" style="margin:0">
        <button class="dash-user__logout" type="submit" title="Выйти">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M6 2H3.5A1.5 1.5 0 002 3.5v9A1.5 1.5 0 003.5 14H6"/>
            <path d="M10.5 11.5L14 8l-3.5-3.5M14 8H6"/>
          </svg>
        </button>
      </form>
    </div>
  </div>
</aside>
{{ end }}
